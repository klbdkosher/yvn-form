<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily YVN Inspection — KLBD</title>
  <style>
    :root { --navy: #003868; --teal: #32A0B0; --orange: #F26C23; --light: #f8f9fa; --success: #28a745; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
    .header { background: var(--navy); color: white; padding: 24px; text-align: center; }
    .header h1 { font-size: 1.4rem; font-weight: 600; }
    .header p { opacity: 0.8; font-size: 0.85rem; margin-top: 4px; }
    .form-body { padding: 24px; }
    .progress-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .progress-dot { width: 12px; height: 12px; border-radius: 50%; background: #e0e0e0; transition: all 0.3s; }
    .progress-dot.active { background: var(--teal); transform: scale(1.3); }
    .progress-dot.done { background: var(--navy); }
    .step { display: none; animation: fadeIn 0.3s ease; }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    h2 { color: var(--navy); font-size: 1.1rem; margin-bottom: 16px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 0.9rem; }
    select, input, textarea { width: 100%; padding: 12px 14px; border: 2px solid #e8e8e8; border-radius: 10px; font-size: 1rem; transition: all 0.2s; background: #fafafa; }
    select:focus, input:focus, textarea:focus { outline: none; border-color: var(--teal); background: white; box-shadow: 0 0 0 3px rgba(50,160,176,0.1); }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 12px; background: #f5f7f9; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
    .checkbox-item:hover { background: #e8f4f6; }
    .checkbox-item.selected { background: #e3f2fd; border-color: var(--teal); }
    .checkbox-item input { display: none; }
    .checkmark { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .checkbox-item.selected .checkmark { background: var(--teal); border-color: var(--teal); color: white; }
    .checkbox-item.selected .checkmark::after { content: '✓'; font-size: 12px; }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 14px 24px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--navy); color: white; }
    .btn-primary:hover { background: #002a4d; transform: translateY(-1px); }
    .btn-secondary { background: var(--teal); color: white; }
    .btn-outline { background: white; color: var(--navy); border: 2px solid var(--navy); }
    .btn-group { display: flex; gap: 10px; margin-top: 24px; }
    .btn-group .btn { flex: 1; }
    .success { text-align: center; padding: 40px; }
    .success-icon { width: 80px; height: 80px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; color: white; animation: popIn 0.5s ease; }
    @keyframes popIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .error { background: #ffebee; color: #c62828; padding: 12px; border-radius: 10px; margin-bottom: 16px; display: none; font-size: 0.9rem; }
    .loading { text-align: center; padding: 40px; }
    .spinner { width: 50px; height: 50px; border: 4px solid #e0e0e0; border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 500px) { .checkbox-grid { grid-template-columns: 1fr; } .time-row { grid-template-columns: 1fr; } body { padding: 10px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Daily YVN Inspection</h1>
      <p>KLBD Kosher Certification</p>
    </div>
    <div class="form-body">
      <div class="progress-bar">
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
      <div class="error" id="error"></div>
      
      <div class="step active" id="step1">
        <h2>👤 Your Details</h2>
        <div class="form-group">
          <label>Inspector</label>
          <select id="inspector"><option value="">Select your name...</option></select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="next(1)">Continue →</button>
        </div>
      </div>
      
      <div class="step" id="step2">
        <h2>🏢 Establishments Visited</h2>
        <div class="form-group">
          <label>Select all that apply:</label>
          <div class="checkbox-grid" id="establishments"></div>
        </div>
        <div class="btn-group">
          <button class="btn btn-outline" onclick="prev(2)">← Back</button>
          <button class="btn btn-primary" onclick="next(2)">Continue →</button>
        </div>
      </div>
      
      <div class="step" id="step3">
        <h2>⏱️ Time & Travel</h2>
        <div class="form-group">
          <label>Working Hours</label>
          <div class="time-row">
            <input type="time" id="start">
            <input type="time" id="end">
          </div>
        </div>
        <div class="form-group">
          <label>Break (hours)</label>
          <input type="number" id="breaks" step="0.5" min="0" value="0">
        </div>
        <div class="form-group">
          <label>Mileage</label>
          <input type="number" id="miles" min="0" placeholder="Miles driven">
        </div>
        <div class="btn-group">
          <button class="btn btn-outline" onclick="prev(3)">← Back</button>
          <button class="btn btn-primary" onclick="next(3)">Continue →</button>
        </div>
      </div>
      
      <div class="step" id="step4">
        <h2>📝 Issues & Notes</h2>
        <div class="form-group">
          <label>Any issues?</label>
          <textarea id="issues" rows="4" placeholder="Describe any kashrus concerns or notes..."></textarea>
        </div>
        <div class="btn-group">
          <button class="btn btn-outline" onclick="prev(4)">← Back</button>
          <button class="btn btn-secondary" onclick="submit()">Submit ✓</button>
        </div>
      </div>
      
      <div class="step" id="loading">
        <div class="loading"><div class="spinner"></div><p>Submitting your report...</p></div>
      </div>
      
      <div class="step" id="success">
        <div class="success">
          <div class="success-icon">✓</div>
          <h2>Submitted!</h2>
          <p style="color:#666;margin-top:8px">Your inspection report has been recorded.</p>
          <button class="btn btn-primary" style="margin-top:24px" onclick="reset()">Submit Another</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    var data = {};
    
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      google.script.run.withSuccessHandler(function(result) {
        var select = document.getElementById('inspector');
        result.inspectors.forEach(function(insp) {
          var option = document.createElement('option');
          option.value = insp.name;
          option.textContent = insp.name;
          option.dataset.email = insp.email;
          select.appendChild(option);
        });
        var container = document.getElementById('establishments');
        result.establishments.forEach(function(est) {
          var item = document.createElement('label');
          item.className = 'checkbox-item';
          item.innerHTML = '<input type="checkbox" value="' + est + '"><span class="checkmark"></span><span>' + est + '</span>';
          item.onclick = function(e) {
            if (e.target.tagName !== 'INPUT') {
              this.classList.toggle('selected');
              this.querySelector('input').checked = this.classList.contains('selected');
            } else { this.classList.toggle('selected', e.target.checked); }
          };
          container.appendChild(item);
        });
      }).getFormData();
    });
    
    function showStep(id) {
      document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
      var dots = document.querySelectorAll('.progress-dot');
      var stepNum = parseInt(id.replace('step', '')) || 5;
      dots.forEach(function(dot, i) {
        dot.classList.remove('active', 'done');
        if (i + 1 === stepNum) dot.classList.add('active');
        else if (i + 1 < stepNum) dot.classList.add('done');
      });
    }
    
    function showError(msg) {
      var el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 4000);
    }
    
    function next(step) {
      if (step === 1) {
        if (!document.getElementById('inspector').value || !document.getElementById('date').value) return showError('Please fill in all fields');
        data.inspector = document.getElementById('inspector').value;
        data.email = document.getElementById('inspector').selectedOptions[0].dataset.email;
        data.date = document.getElementById('date').value;
      }
      if (step === 2) {
        var selected = document.querySelectorAll('#establishments input:checked');
        if (!selected.length) return showError('Select at least one establishment');
        data.establishments = Array.from(selected).map(function(cb) { return cb.value; });
      }
      if (step === 3) {
        if (!document.getElementById('start').value || !document.getElementById('end').value) return showError('Enter start and end times');
        data.start = document.getElementById('start').value;
        data.end = document.getElementById('end').value;
        data.breaks = document.getElementById('breaks').value || 0;
        data.miles = document.getElementById('miles').value || 0;
      }
      showStep('step' + (step + 1));
    }
    
    function prev(step) { showStep('step' + (step - 1)); }
    
    function submit() {
      data.issues = document.getElementById('issues').value;
      var s = data.start.split(':'), e = data.end.split(':');
      var startMins = parseInt(s[0]) * 60 + parseInt(s[1]);
      var endMins = parseInt(e[0]) * 60 + parseInt(e[1]);
      data.hours = ((endMins - startMins) / 60 - parseFloat(data.breaks)).toFixed(1);
      showStep('loading');
      google.script.run.withSuccessHandler(function() { showStep('success'); })
        .withFailureHandler(function(err) { showError(err.message); showStep('step4'); })
        .submitInspection(data);
    }
    
    function reset() {
      data = {};
      document.getElementById('inspector').value = '';
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      document.querySelectorAll('.checkbox-item').forEach(function(item) { item.classList.remove('selected'); item.querySelector('input').checked = false; });
      document.getElementById('start').value = '';
      document.getElementById('end').value = '';
      document.getElementById('breaks').value = '0';
      document.getElementById('miles').value = '';
      document.getElementById('issues').value = '';
      showStep('step1');
    }
  </script>
</body>
</html>
